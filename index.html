<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟 - Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">🍅 番茄钟</h1>

    <div class="mode-tabs">
      <button class="mode-btn active" data-mode="work">工作</button>
      <button class="mode-btn" data-mode="shortBreak">短休息</button>
      <button class="mode-btn" data-mode="longBreak">长休息</button>
    </div>

    <div class="timer-ring">
      <svg viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="90" />
        <circle class="ring-progress" cx="100" cy="100" r="90" />
      </svg>
      <div class="timer-display">
        <span class="time" id="timeDisplay">25:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="startPauseBtn">开始</button>
      <button class="ctrl-btn secondary" id="resetBtn">重置</button>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="sessionCount">0</span>
        <span class="stat-label">完成番茄</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="totalFocusTime">0 分钟</span>
        <span class="stat-label">总专注时间</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
